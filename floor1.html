<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Floor 1 AR</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: fixed;
      inset: 0;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
    }

    .hint {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.55);
      padding: 10px 12px;
      border-radius: 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="hint">Камераны суретке бағыттаңыз</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets/floor1.mind; autoStart: true; uiScanning: yes;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- N01 -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box color="red" position="0 0.5 0" depth="0.3" height="0.3" width="0.3"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-box>
    </a-entity>

    <!-- N02 -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-sphere color="gold" position="0 0.5 0" radius="0.22"
        animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 800">
      </a-sphere>
    </a-entity>

    <!-- N03 -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-cone color="green" position="0 0.5 0" radius-bottom="0.25" height="0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 2500">
      </a-cone>
    </a-entity>
  </a-scene>
</body>
</html>

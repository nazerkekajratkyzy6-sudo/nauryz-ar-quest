<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Табло</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f172a;
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
    }
    th {
      background: #1e293b;
    }
  </style>
</head>
<body>
  <h1>Табло результатов</h1>
  <table id="table">
    <tr>
      <th>Место</th>
      <th>Команда</th>
      <th>Очки</th>
      <th>Маркеры</th>
      <th>Дұрыс</th>
      <th>Қате</th>
      <th>Уақыт</th>
    </tr>
  </table>

  <script src="./game-data.js"></script>
  <script type="module" src="./firebase-config.js"></script>
  <script type="module">
    const table = document.getElementById("table");
    const { db, ref, onValue } = window.FB;

    let teamsCache = {};

    function formatLeft(startTime) {
      if (!startTime) return "10:00";
      const passed = Math.floor((Date.now() - startTime) / 1000);
      const left = Math.max(0, window.GAME.durationSeconds - passed);
      const m = Math.floor(left / 60).toString().padStart(2, "0");
      const s = (left % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function render() {
      const teams = Object.values(teamsCache).sort((a, b) => (b.score || 0) - (a.score || 0));
      let html = `
        <tr>
          <th>Место</th>
          <th>Команда</th>
          <th>Очки</th>
          <th>Маркеры</th>
          <th>Дұрыс</th>
          <th>Қате</th>
          <th>Уақыт</th>
        </tr>
      `;

      teams.forEach((t, idx) => {
        html += `
          <tr>
            <td>${idx + 1}</td>
            <td>${t.displayName || ""}</td>
            <td>${t.score || 0}</td>
            <td>${t.found || 0}</td>
            <td>${t.correct || 0}</td>
            <td>${t.wrong || 0}</td>
            <td>${formatLeft(t.startTime)}</td>
          </tr>
        `;
      });

      table.innerHTML = html;
    }

    onValue(ref(db, "teams"), (snapshot) => {
      teamsCache = snapshot.val() || {};
      render();
    });

    setInterval(render, 1000);
  </script>
</body>
</html>
